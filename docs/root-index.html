<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nauka — Turn bare-metal into a programmable cloud</title>
  <link rel="icon" type="image/svg+xml" href="/nightly/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* subtle radial glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(96,165,250,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      position: relative;
      text-align: center;
      padding: 2rem;
      max-width: 640px;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 0 24px rgba(96,165,250,.25));
    }
    .logo path { fill: #e2e8f0; }

    h1 {
      font-size: 2.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1.125rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .channels {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .channel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.375rem;
      padding: 1.25rem 2rem;
      border-radius: 0.75rem;
      border: 1px solid #1e293b;
      background: rgba(15,23,42,.6);
      text-decoration: none;
      color: #e2e8f0;
      transition: all 0.2s ease;
      min-width: 140px;
    }

    .channel:hover {
      border-color: #334155;
      background: rgba(30,41,59,.8);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
    }

    .channel-name {
      font-size: 1.125rem;
      font-weight: 600;
    }

    .channel-desc {
      font-size: 0.8125rem;
      color: #64748b;
    }

    .channel.stable { border-color: #1e3a2f; }
    .channel.stable:hover { border-color: #22c55e44; box-shadow: 0 8px 24px rgba(34,197,94,.08); }
    .channel.stable .dot { background: #22c55e; }

    .channel.beta { border-color: #1e2a3b; }
    .channel.beta:hover { border-color: #3b82f644; box-shadow: 0 8px 24px rgba(59,130,246,.08); }
    .channel.beta .dot { background: #3b82f6; }

    .channel.nightly { border-color: #2a1e3b; }
    .channel.nightly:hover { border-color: #a855f744; box-shadow: 0 8px 24px rgba(168,85,247,.08); }
    .channel.nightly .dot { background: #a855f7; }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .links {
      margin-top: 2.5rem;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      font-size: 0.875rem;
    }

    .links a {
      color: #64748b;
      text-decoration: none;
      transition: color 0.15s;
    }
    .links a:hover { color: #94a3b8; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
      <path fill-rule="evenodd" d="M81 36 64 0 47 36l-1 2-9-10a6 6 0 0 0-9 9l10 10h-2L0 64l36 17h2L28 91a6 6 0 1 0 9 9l9-10 1 2 17 36 17-36v-2l9 10a6 6 0 1 0 9-9l-9-9 2-1 36-17-36-17-2-1 9-9a6 6 0 1 0-9-9l-9 10v-2Zm-17 2-2 5c-4 8-11 15-19 19l-5 2 5 2c8 4 15 11 19 19l2 5 2-5c4-8 11-15 19-19l5-2-5-2c-8-4-15-11-19-19l-2-5Z" clip-rule="evenodd"/>
      <path d="M118 19a6 6 0 0 0-9-9l-3 3a6 6 0 1 0 9 9l3-3Zm-96 4c-2 2-6 2-9 0l-3-3a6 6 0 1 1 9-9l3 3c3 2 3 6 0 9Zm0 82c-2-2-6-2-9 0l-3 3a6 6 0 1 0 9 9l3-3c3-2 3-6 0-9Zm96 4a6 6 0 0 1-9 9l-3-3a6 6 0 1 1 9-9l3 3Z"/>
      <style>path{fill:#e2e8f0}</style>
    </svg>

    <h1>Nauka</h1>
    <p class="tagline">Turn bare-metal servers into a programmable cloud.</p>

    <div class="channels">
      <a href="/stable/" class="channel stable">
        <span class="dot"></span>
        <span class="channel-name">Stable</span>
        <span class="channel-desc">Production-ready</span>
      </a>
      <a href="/beta/" class="channel beta">
        <span class="dot"></span>
        <span class="channel-name">Beta</span>
        <span class="channel-desc">Preview release</span>
      </a>
      <a href="/nightly/" class="channel nightly">
        <span class="dot"></span>
        <span class="channel-name">Nightly</span>
        <span class="channel-desc">Latest from main</span>
      </a>
    </div>

    <div class="links">
      <a href="https://github.com/sifrah/nauka">GitHub</a>
      <a href="/stable/api/nauka_core/">API Reference</a>
    </div>
  </div>

  <footer>Open-source &middot; Apache 2.0</footer>
</body>
</html>
