name: CI

on:
  push:
    branches: [basics_v2]
  pull_request:
    branches: [basics_v2]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Secret scanning ────────────────────────────────────────
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ── Validate .gitignore contains critical patterns ─────────
  gitignore:
    name: Validate .gitignore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check critical patterns exist in .gitignore
        run: |
          missing=0
          for pattern in ".nauka" "state.json" "*.redb" "*.pem" "*.key"; do
            if ! grep -qF "$pattern" .gitignore; then
              echo "MISSING from .gitignore: $pattern"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "::error::.gitignore is missing critical patterns"
            exit 1
          fi
          echo "All critical patterns present in .gitignore"

  # ── fmt + clippy + test in one job ───────────────────────
  # One job, one cache, one compile: clippy warms the workspace's check
  # artifacts, then `cargo test --workspace` reuses them. The previous
  # per-crate matrix rebuilt shared deps (nauka-state) three times.
  # Note: integration tests requiring root/WireGuard are #[ignore]d and
  # not run in CI. Run locally with: sudo cargo test -- --ignored
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y cmake
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy --workspace --all-targets
        run: cargo clippy --workspace --all-targets -- -D warnings -D clippy::print_stdout -D clippy::print_stderr

      - name: cargo test --workspace
        run: cargo test --workspace
