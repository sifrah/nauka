name: Promote

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Source tag to promote (e.g. v0.1.0-nightly.5)'
        required: true
        type: string
      target_channel:
        description: 'Target channel'
        required: true
        type: choice
        options:
          - beta
          - stable

permissions:
  contents: write

jobs:
  promote:
    name: Promote ${{ inputs.source_tag }} → ${{ inputs.target_channel }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate source tag
        run: |
          if ! git rev-parse "${{ inputs.source_tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ inputs.source_tag }} does not exist"
            exit 1
          fi

      - name: Validate promotion path
        run: |
          TAG="${{ inputs.source_tag }}"
          CHANNEL="${{ inputs.target_channel }}"

          if [ "$CHANNEL" = "beta" ]; then
            if ! echo "$TAG" | grep -qE '\-nightly\.'; then
              echo "::error::Can only promote nightly → beta (got $TAG)"
              exit 1
            fi
          elif [ "$CHANNEL" = "stable" ]; then
            if ! echo "$TAG" | grep -qE '\-beta\.'; then
              echo "::error::Can only promote beta → stable (got $TAG)"
              exit 1
            fi
          fi

      - name: Calculate target version
        id: version
        run: |
          SOURCE="${{ inputs.source_tag }}"
          CHANNEL="${{ inputs.target_channel }}"

          # Extract base version (strip v prefix and pre-release suffix)
          BASE=$(echo "${SOURCE#v}" | sed 's/-.*//')

          if [ "$CHANNEL" = "stable" ]; then
            TARGET_TAG="v${BASE}"
          else
            N=$(git tag --list "v${BASE}-${CHANNEL}.*" | wc -l | tr -d ' ')
            N=$((N + 1))
            TARGET_TAG="v${BASE}-${CHANNEL}.${N}"
          fi

          if git rev-parse "$TARGET_TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TARGET_TAG already exists"
            exit 1
          fi

          echo "tag=$TARGET_TAG" >> "$GITHUB_OUTPUT"
          echo "Promoting $SOURCE → $TARGET_TAG"

      - name: Download source artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download "${{ inputs.source_tag }}" -D artifacts/

      - name: Create promoted release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_TAG: ${{ steps.version.outputs.tag }}
          CHANNEL: ${{ inputs.target_channel }}
        run: |
          SOURCE_SHA=$(git rev-list -n 1 "${{ inputs.source_tag }}")
          git tag "$TARGET_TAG" "$SOURCE_SHA"
          git push origin "$TARGET_TAG"

          PRERELEASE="--prerelease"
          if [ "$CHANNEL" = "stable" ]; then
            PRERELEASE="--latest"
          fi

          gh release create "$TARGET_TAG" \
            --title "$TARGET_TAG" \
            $PRERELEASE \
            --notes "Promoted from ${{ inputs.source_tag }} to ${CHANNEL}" \
            artifacts/*
