name: Release (dev)

on:
  push:
    branches: [v2, main]
    paths:
      - 'layers/*/src/**'
      - 'bin/*/src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Dev release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: Install musl-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config libssl-dev

      - name: Calculate version
        id: version
        run: |
          # Find latest stable tag
          LATEST=$(git tag --list 'v[0-9]*' --sort=-v:refname | grep -v '-' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest stable: $LATEST"

          # Parse semver
          VER=${LATEST#v}
          MAJOR=$(echo "$VER" | cut -d. -f1)
          MINOR=$(echo "$VER" | cut -d. -f2)
          PATCH=$(echo "$VER" | cut -d. -f3)

          # Scan commits for bump type
          COMMITS=$(git log $LATEST..HEAD --oneline 2>/dev/null || echo "initial")
          if echo "$COMMITS" | grep -iqE "BREAKING|breaking:"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -iqE "feat:"; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          BASE="${MAJOR}.${MINOR}.${PATCH}"

          # Count dev builds
          DEV_N=$(git tag --list "v${BASE}-dev.*" | wc -l)
          DEV_N=$((DEV_N + 1))

          VERSION="${BASE}-dev.${DEV_N}"
          TAG="v${VERSION}"

          # Skip if tag exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build
        if: steps.version.outputs.skip != 'true'
        run: |
          cargo build --release --target x86_64-unknown-linux-musl
          strip target/x86_64-unknown-linux-musl/release/nauka

      - name: Create release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Create tag
          git tag "$TAG"
          git push origin "$TAG"

          # Create checksums
          cd target/x86_64-unknown-linux-musl/release
          sha256sum nauka > SHA256SUMS.txt

          # Create GitHub release
          gh release create "$TAG" \
            --title "$TAG" \
            --prerelease \
            --notes "Dev build $VERSION" \
            nauka SHA256SUMS.txt
