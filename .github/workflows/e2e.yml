name: E2E Tests

on:
  push:
    branches: [main, v2]
    paths:
      - 'layers/**'
      - 'bin/**'
      - 'tests/**'
      - 'Cargo.toml'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main, v2]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Discover all e2e test crates dynamically
  discover:
    runs-on: ubuntu-latest
    outputs:
      e2e_crates: ${{ steps.find.outputs.crates }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          # Extract package names (not test names) from e2e Cargo.toml files
          crates=$(find layers -path '*/tests/e2e/Cargo.toml' \
            -exec grep -m1 'name = ' {} \; \
            | grep -oP 'name = "\K[^"]+' \
            | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "Discovered E2E crates: $crates"
          echo "crates=$crates" >> "$GITHUB_OUTPUT"

  # Run each layer's E2E tests in parallel
  e2e:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.discover.outputs.e2e_crates) }}
    name: "e2e: ${{ matrix.crate }}"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run E2E tests
        run: cargo test -p ${{ matrix.crate }} --verbose

  # CLI E2E tests (run the binary like a real user)
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Run CLI E2E tests
        run: |
          for script in $(find layers -path '*/tests/e2e/cli_test.sh'); do
            echo "=== Running $script ==="
            NAUKA_BIN=target/release/nauka bash "$script"
          done

  # Unit tests + clippy (whole workspace)
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Unit tests
        run: |
          # Exclude e2e crates from unit test run.
          #
          # --test-threads=1 because EmbeddedDb (SurrealKV) tests drive
          # multiple SurrealDB router tasks concurrently across crates
          # (nauka-state + nauka-hypervisor + ...). On the 2-vCPU
          # ubuntu-latest runner the router tasks starve each other
          # enough to hang `crud_round_trip` despite the per-test
          # runtime being current_thread — see sifrah/nauka#255 for
          # the investigation. Running one test at a time inside
          # each binary gives tokio's cooperative scheduler enough
          # headroom to make progress on every datastore.
          cargo test --workspace \
            $(find layers -path '*/tests/e2e/Cargo.toml' \
              -exec grep -oP 'name = "\K[^"]+' {} \; \
              | sed 's/^/--exclude /') \
            -- --test-threads=1

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
