name: Nightly

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Calculate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      tag: ${{ steps.calc.outputs.tag }}
      skip: ${{ steps.calc.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Calculate next nightly version
        id: calc
        run: |
          # Find latest stable tag for base version
          LATEST=$(git tag --list 'v[0-9]*' --sort=-v:refname | grep -vE '(nightly|beta)' | head -1)
          if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi

          VER=${LATEST#v}
          MAJOR=$(echo "$VER" | cut -d. -f1)
          MINOR=$(echo "$VER" | cut -d. -f2)
          PATCH=$(echo "$VER" | cut -d. -f3)

          # Bump based on commit messages
          COMMITS=$(git log "${LATEST}..HEAD" --oneline 2>/dev/null || echo "initial")
          if echo "$COMMITS" | grep -iqE "BREAKING|breaking:"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -iqE "feat:"; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          BASE="${MAJOR}.${MINOR}.${PATCH}"

          # Increment nightly counter
          N=$(git tag --list "v${BASE}-nightly.*" | wc -l | tr -d ' ')
          N=$((N + 1))

          VERSION="${BASE}-nightly.${N}"
          TAG="v${VERSION}"

          # Check remote (not local) to avoid race conditions between parallel runs
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists on remote, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: version
    if: needs.version.outputs.skip != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --locked

      - name: Build (cargo)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        env:
          NAUKA_VERSION: ${{ needs.version.outputs.version }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        env:
          NAUKA_VERSION: ${{ needs.version.outputs.version }}
        run: cross build --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: target/${{ matrix.target }}/release/nauka

  release:
    name: Create nightly release
    needs: [version, build]
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package archives
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p release
          for target_dir in artifacts/*/; do
            target=$(basename "$target_dir")
            archive="nauka-v${VERSION}-${target}.tar.gz"
            chmod +x "${target_dir}nauka"
            tar czf "release/${archive}" -C "$target_dir" nauka
          done
          cp scripts/install.sh release/install.sh
          cd release && sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          git tag "$TAG"
          if ! git push origin "$TAG" 2>&1; then
            echo "Tag $TAG already exists (concurrent run), skipping release"
            exit 0
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --prerelease \
            --notes "Nightly build ${VERSION}" \
            release/*

      - name: Trigger docs build for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          CHANNEL="nightly"
          gh workflow run docs.yml \
            -f channel="${CHANNEL}" \
            -f tag="${TAG}"
