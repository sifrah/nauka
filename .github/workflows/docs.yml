name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'layers/**/*.rs'
      - 'bin/**/*.rs'
      - 'Cargo.toml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel to deploy'
        required: true
        type: choice
        options:
          - nightly
          - beta
          - stable
      tag:
        description: 'Release tag (e.g., v0.0.1-nightly.28). Leave empty for channel-only deploy.'
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Resolve channel + tag from trigger ───────────────────────
  resolve:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.ch.outputs.channel }}
      tag: ${{ steps.ch.outputs.tag }}
    steps:
      - name: Determine channel and tag
        id: ch
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "channel=nightly" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "channel=${{ inputs.channel }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            case "$TAG" in
              *-nightly.*) echo "channel=nightly" >> "$GITHUB_OUTPUT" ;;
              *-beta.*)    echo "channel=beta"    >> "$GITHUB_OUTPUT" ;;
              *)           echo "channel=stable"  >> "$GITHUB_OUTPUT" ;;
            esac
          fi

  # ── Build docs ─────────────────────────────────────────────
  build:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      # ── Channel build (always from HEAD of main) ──
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Sync docs from layers
        run: bash scripts/sync-docs.sh

      - name: Generate OpenAPI spec
        run: cargo run --bin nauka-openapi --release > docs/public/openapi.json

      - name: Build Rust API docs
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "--default-theme ayu"

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs (channel)
        working-directory: docs
        env:
          DOCS_CHANNEL: ${{ needs.resolve.outputs.channel }}
        run: npx astro build

      - name: Copy rustdoc into channel build
        run: cp -r target/doc docs/dist/api

      - uses: actions/upload-artifact@v4
        with:
          name: docs-channel
          path: docs/dist

      # ── Tag build (from the tag commit) ──
      - name: Checkout tag commit
        if: needs.resolve.outputs.tag != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          clean: false

      - name: Reinstall docs deps for tag
        if: needs.resolve.outputs.tag != ''
        working-directory: docs
        run: npm ci

      - name: Build docs (tag)
        if: needs.resolve.outputs.tag != ''
        working-directory: docs
        env:
          DOCS_CHANNEL: ${{ needs.resolve.outputs.tag }}
        run: |
          rm -rf dist
          npx astro build

      - name: Copy rustdoc into tag build
        if: needs.resolve.outputs.tag != ''
        run: cp -r target/doc docs/dist/api

      - uses: actions/upload-artifact@v4
        if: needs.resolve.outputs.tag != ''
        with:
          name: docs-tag
          path: docs/dist

  # ── Deploy to gh-pages branch ──────────────────────────────
  deploy:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      # Checkout gh-pages branch (the persistent store)
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: _site
          fetch-depth: 1
        continue-on-error: true

      - name: Init gh-pages if needed
        run: |
          if [ ! -d _site/.git ]; then
            mkdir -p _site
            cd _site
            git init
            git checkout --orphan gh-pages
            touch .nojekyll
            git add .nojekyll
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "init gh-pages"
          fi

      - name: Download channel artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-channel
          path: _channel

      - name: Download tag artifact
        if: needs.resolve.outputs.tag != ''
        uses: actions/download-artifact@v4
        with:
          name: docs-tag
          path: _tag

      - name: Checkout root-index
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          sparse-checkout: docs/root-index.html
          path: _repo

      - name: Merge into site
        env:
          CHANNEL: ${{ needs.resolve.outputs.channel }}
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          # Landing page
          cp _repo/docs/root-index.html _site/index.html

          # GitHub Pages config
          touch _site/.nojekyll
          echo "www.getnauka.com" > _site/CNAME

          # Deploy channel (always)
          rm -rf "_site/${CHANNEL}"
          cp -r _channel "_site/${CHANNEL}"

          # Deploy tag (if release)
          if [ -n "${TAG}" ] && [ -d _tag ]; then
            rm -rf "_site/${TAG}"
            cp -r _tag "_site/${TAG}"
          fi

      - name: Build versions.json from GitHub releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          node -e "
            const { execSync } = require('child_process');
            const result = execSync(
              'gh api repos/${REPO}/releases --paginate --jq \".[] | {tag: .tag_name, date: .published_at, prerelease: .prerelease}\"',
              { encoding: 'utf8', maxBuffer: 10 * 1024 * 1024 }
            );
            const versions = result.trim().split('\n').filter(Boolean).map(line => {
              const r = JSON.parse(line);
              let channel = 'stable';
              if (r.tag.includes('-nightly.')) channel = 'nightly';
              else if (r.tag.includes('-beta.')) channel = 'beta';
              return {
                tag: r.tag,
                channel,
                date: r.date ? r.date.split('T')[0] : ''
              };
            });
            versions.sort((a, b) => b.date.localeCompare(a.date));
            require('fs').writeFileSync(
              '_site/versions.json',
              JSON.stringify({ versions }, null, 2)
            );
            console.log('versions.json: ' + versions.length + ' releases');
          "

      - name: Commit and push to gh-pages
        run: |
          cd _site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi
          git commit -m "docs: deploy ${{ needs.resolve.outputs.channel }}${{ needs.resolve.outputs.tag && format(' ({0})', needs.resolve.outputs.tag) || '' }}"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages --force
