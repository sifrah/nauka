name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'layers/**/*.rs'
      - 'bin/**/*.rs'
      - 'Cargo.toml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel to deploy'
        required: true
        type: choice
        options:
          - nightly
          - beta
          - stable

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Resolve channel from trigger ───────────────────────────
  resolve-channel:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.ch.outputs.channel }}
    steps:
      - name: Determine channel
        id: ch
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "channel=nightly" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "channel=${{ inputs.channel }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            case "$TAG" in
              *-nightly.*) echo "channel=nightly" >> "$GITHUB_OUTPUT" ;;
              *-beta.*)    echo "channel=beta"    >> "$GITHUB_OUTPUT" ;;
              *)           echo "channel=stable"  >> "$GITHUB_OUTPUT" ;;
            esac
          fi

  # ── Build docs for this channel ────────────────────────────
  build:
    needs: resolve-channel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Sync docs from layers
        run: bash scripts/sync-docs.sh

      - name: Generate OpenAPI spec
        run: cargo run --bin nauka-openapi --release > docs/public/openapi.json

      - name: Build Starlight site
        working-directory: docs
        env:
          DOCS_CHANNEL: ${{ needs.resolve-channel.outputs.channel }}
        run: |
          npm ci
          npx astro build

      - name: Build Rust API docs
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "--default-theme ayu"

      - name: Copy rustdoc into site
        run: cp -r target/doc docs/dist/api

      - uses: actions/upload-artifact@v4
        with:
          name: docs-channel
          path: docs/dist

  # ── Merge into full site and deploy ────────────────────────
  deploy:
    needs: [resolve-channel, build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download current site
        run: |
          mkdir -p _site
          PAGES_URL=$(curl -fsSL \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            | jq -r '.html_url // empty') || true
          if [ -n "$PAGES_URL" ]; then
            for ch in stable beta nightly; do
              mkdir -p "_site/${ch}"
              wget -q -r -np -nH -P "_site/${ch}" \
                "${PAGES_URL}${ch}/" 2>/dev/null || true
            done
          fi

      - name: Download built channel
        uses: actions/download-artifact@v4
        with:
          name: docs-channel
          path: _channel

      - name: Merge channel into site
        env:
          CHANNEL: ${{ needs.resolve-channel.outputs.channel }}
        run: |
          rm -rf "_site/${CHANNEL}"
          cp -r _channel "_site/${CHANNEL}"

      - uses: actions/checkout@v4
        with:
          sparse-checkout: docs/root-index.html
          path: _repo

      - name: Copy landing page
        run: cp _repo/docs/root-index.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
